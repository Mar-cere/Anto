# Backend: golden prompts (#119) + blindaje i18n push/email.
name: Backend tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test.yml'
  push:
    branches: [main, master, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-test.yml'

jobs:
  i18n-blindaje:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Auditoría i18n (push, email, técnicas)
        run: npm run audit:i18n

      - name: Tests i18n (push + mailer + tono)
        env:
          NODE_ENV: test
        run: npm run test:i18n && NODE_ENV=test node --experimental-vm-modules node_modules/jest/bin/jest.js tests/unit/utils/copyToneGuards.test.js --coverage=false

  prompt-golden:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Golden prompt regression (#119)
        env:
          NODE_ENV: test
          ENABLE_PROMPT_HISTORY_TELEMETRY: 'false'
        run: npm run test:prompt-golden
